<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>随机数摇奖器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 24px;
            padding: 60px 80px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
        }
        
        h1 {
            color: #333;
            margin-bottom: 40px;
            font-size: 32px;
            font-weight: 600;
        }
        
        .number-display {
            font-size: 120px;
            font-weight: bold;
            color: #667eea;
            margin: 40px 0;
            line-height: 1;
            transition: transform 0.1s ease;
        }
        
        .number-display.rolling {
            animation: shake 0.1s infinite;
        }
        
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px) rotate(-2deg); }
            75% { transform: translateX(5px) rotate(2deg); }
        }
        
        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 18px 60px;
            font-size: 20px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 20px;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }
        
        .range-info {
            color: #999;
            margin-top: 30px;
            font-size: 14px;
        }
        
        .history {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid #eee;
        }
        
        .history-title {
            color: #666;
            font-size: 14px;
            margin-bottom: 15px;
        }
        
        .history-numbers {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .history-number {
            background: #f5f5f5;
            color: #666;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 16px;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <div style="margin-bottom:20px">
            <a href="../index.html" style="color:#667eea;text-decoration:none;font-size:14px;font-weight:500">← 返回工具箱</a>
        </div>
        
        <h1>🎰 随机数摇奖器</h1>
        
        <div class="number-display" id="numberDisplay">--</div>
        
        <button class="btn" id="rollBtn" onclick="roll()">摇 奖</button>
        
        <div class="range-info">范围：0 - 100</div>
        
        <div class="history" id="historySection" style="display: none;">
            <div class="history-title">历史记录</div>
            <div class="history-numbers" id="historyNumbers"></div>
        </div>
    </div>
    
    <script>
        let isRolling = false;
        let history = [];
        const maxHistory = 10;
        
        function roll() {
            if (isRolling) return;
            
            isRolling = true;
            const btn = document.getElementById('rollBtn');
            const display = document.getElementById('numberDisplay');
            
            btn.disabled = true;
            btn.textContent = '摇奖中...';
            display.classList.add('rolling');
            
            // 滚动动画
            let rollCount = 0;
            const rollInterval = setInterval(() => {
                display.textContent = Math.floor(Math.random() * 101);
                rollCount++;
                
                if (rollCount >= 20) {
                    clearInterval(rollInterval);
                    
                    // 最终结果
                    const finalNumber = Math.floor(Math.random() * 101);
                    display.textContent = finalNumber;
                    display.classList.remove('rolling');
                    
                    // 添加到历史记录
                    addToHistory(finalNumber);
                    
                    btn.disabled = false;
                    btn.textContent = '摇 奖';
                    isRolling = false;
                }
            }, 50);
        }
        
        function addToHistory(number) {
            history.unshift(number);
            if (history.length > maxHistory) {
                history.pop();
            }
            
            updateHistoryDisplay();
        }
        
        function updateHistoryDisplay() {
            const historySection = document.getElementById('historySection');
            const historyNumbers = document.getElementById('historyNumbers');
            
            if (history.length > 0) {
                historySection.style.display = 'block';
                historyNumbers.innerHTML = history.map(num => 
                    `<span class="history-number">${num}</span>`
                ).join('');
            }
        }
    </script>
</body>
</html>
